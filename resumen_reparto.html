<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>MYC HIELO – Resumen de Reparto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:        #0d1b2e;
  --surface:   #132238;
  --surface2:  #1a2f48;
  --border:    #243a55;
  --accent:    #00c4ff;
  --accent2:   #0086cc;
  --success:   #00e096;
  --danger:    #ff4d6d;
  --warning:   #ffb547;
  --text:      #e8f0fb;
  --text-muted:#7a9abf;
  --radius:    14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; font-size: 14px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.container { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
.header { background: linear-gradient(135deg, #0d2d52 0%, #0a1e35 60%, #061529 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; position: relative; overflow: hidden; }
.header::before { content: '🧊'; position: absolute; right: -10px; top: -20px; font-size: 120px; opacity: 0.04; pointer-events: none; }
.header-left h1 { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.5px; color: #fff; display: flex; align-items: center; gap: 10px; }
.header-left h1 span { color: var(--accent); }
.header-left p { color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.card-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.card-title { font-weight: 700; font-size: 0.95rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; background: var(--surface2); flex-shrink: 0; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.kpi-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; position: relative; overflow: hidden; }
.kpi-card::after { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--kpi-color, var(--accent)); border-radius: 3px 0 0 3px; }
.kpi-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 6px; }
.kpi-value { font-size: 1.7rem; font-weight: 800; color: var(--text); line-height: 1; }
.kpi-card.deuda   { --kpi-color: var(--danger); }
.kpi-card.cobros  { --kpi-color: var(--success); }
.kpi-card.gastos  { --kpi-color: var(--warning); }
.kpi-card.neto    { --kpi-color: var(--accent); }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 40px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; font-family: inherit; }
.btn:active { transform: scale(0.96); }
.btn-primary   { background: var(--accent);   color: #041020; }
.btn-success   { background: var(--success);  color: #041020; }
.btn-danger    { background: var(--danger);   color: #fff; }
.btn-warning   { background: var(--warning);  color: #041020; }
.btn-ghost     { background: rgba(255,255,255,0.08); color: var(--text); }
.scroll-table { overflow-x: auto; overflow-y: auto; max-height: 420px; border-radius: var(--radius-sm); }
table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
thead th { background: var(--bg); color: var(--text-muted); font-weight: 600; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; position: sticky; top: 0; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
tbody td { padding: 9px 12px; vertical-align: middle; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 0.65rem; font-weight: 600; white-space: nowrap; }
.badge-deuda         { background: rgba(255,77,109,0.15);  color: #ff8099; }
.badge-pago          { background: rgba(0,224,150,0.15);   color: #00e096; }
.badge-efectivo      { background: rgba(0,196,255,0.15);   color: #00c4ff; }
.badge-transferencia { background: rgba(255,181,71,0.15);  color: #ffb547; }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 9999; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; backdrop-filter: blur(10px); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 8000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal.open { display: flex; }
.modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 520px; }
.num-positive { color: var(--success); font-weight: 700; }
.num-negative { color: var(--danger);  font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-left"><h1>🧊 MYC <span>HIELO</span></h1><p>Panel de Reparto · Control Total</p></div>
    <div class="header-actions no-print">
      <button id="refreshBtn" class="btn btn-ghost"><i class="fas fa-sync-alt"></i> Actualizar</button>
      <button id="exportExcelBtn" class="btn btn-success"><i class="fas fa-file-excel"></i> Exportar todo</button>
      <button onclick="window.print()" class="btn btn-ghost"><i class="fas fa-print"></i> Imprimir</button>
    </div>
  </header>

  <div class="kpi-grid">
    <div class="kpi-card deuda"><div class="kpi-label">🔴 Total Deuda Acumulada</div><div class="kpi-value" id="totalDeudas">$0</div></div>
    <div class="kpi-card cobros"><div class="kpi-label">✅ Cobros de Deuda</div><div class="kpi-value" id="totalCobros">$0</div></div>
    <div class="kpi-card gastos"><div class="kpi-label">💸 Gastos del Día</div><div class="kpi-value" id="totalGastos">$0</div></div>
    <div class="kpi-card neto"><div class="kpi-label">💰 Neto General Hoy</div><div class="kpi-value" id="netoTotal">$0</div></div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title"><span class="icon">🔍</span> Buscar Cliente</div><button id="limpiarBusquedaBtn" class="btn btn-warning btn-sm no-print">Limpiar</button></div>
    <div style="display:flex; gap:8px;"><input type="text" id="buscarClienteInput" placeholder="Nombre del cliente..." style="flex:1"><button id="buscarClienteBtn" class="btn btn-primary">Buscar</button></div>
    <div id="clienteResultado"></div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title"><span class="icon">📜</span> Movimientos</div><div class="no-print"><input type="date" id="fechaMovimientos"><button id="verFechaMovBtn" class="btn btn-primary btn-sm">Ver fecha</button><button id="verTodosMovBtn" class="btn btn-success btn-sm">Todos</button><button id="exportMovExcelBtn" class="btn btn-success btn-sm"><i class="fas fa-file-excel"></i> Excel</button></div></div>
    <div class="scroll-table"><table id="tablaMovimientos"><thead><tr><th>Fecha</th><th>Cliente</th><th>Tipo</th><th>Monto</th><th>Detalle</th><th class="no-print">Acción</th></tr></thead><tbody id="bodyMovimientos"></tbody></table></div>
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title"><span class="icon">📋</span> Clientes con Deuda</div><div class="no-print"><button onclick="exportarDeudoresExcel()" class="btn btn-success btn-sm"><i class="fas fa-file-excel"></i> Excel</button></div></div>
    <div class="scroll-table"><table id="tablaDeudores"><thead><tr><th>Cliente</th><th>Saldo Deudor</th><th>Estado</th></tr></thead><tbody id="bodyDeudores"></tbody></table></div>
  </div>
</div>
<div id="toast"></div>
<div id="modal" class="modal"><div class="modal-content"><div class="modal-title">Confirmar</div><div id="modalBody"></div><div class="modal-footer" style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;"><button id="modalCancelar" class="btn btn-ghost">Cancelar</button><button id="modalConfirmar" class="btn btn-danger">Confirmar</button></div></div></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzicnzoTue4SiLP1Nn1vnjSYLqA2GM7q97IiQK_cMSk__TZ7R_ZqDNvNX3LmAV5Y4Mc/exec";

let clientes = [], movimientos = [], ventas = [], gastos = [];

function toast(msg) { const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2500); }
function pesos(n) { return '$' + n.toLocaleString('es-AR', { minimumFractionDigits: 0 }); }
function fechaYMD(fecha) { if (!fecha) return ''; let s = String(fecha).split('T')[0]; if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10); return s; }
function fechaDMY(f) { const p = fechaYMD(f).split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : f; }
function normalizarNumero(v) { let n = parseFloat(String(v).replace(/[$,]/g,'')); return isNaN(n) ? 0 : n; }

async function apiCall(ruta, params = {}, usePost = false) {
  if (usePost) {
    const form = new URLSearchParams();
    for (const [k,v] of Object.entries(params)) form.append(k, v);
    const res = await fetch(API_URL, { method: 'POST', body: form });
    return await res.json();
  } else {
    const url = new URL(API_URL);
    url.searchParams.append('ruta', ruta);
    for (const [k,v] of Object.entries(params)) url.searchParams.append(k, v);
    const res = await fetch(url);
    return await res.json();
  }
}

async function cargarTodo() {
  try {
    const [cli, mov, ven, gas] = await Promise.all([
      apiCall('clientes'),
      apiCall('movimientos'),
      apiCall('obtenerVentas'),
      apiCall('obtenerGastos')
    ]);
    clientes = (cli || []).map(c => String(c).trim().toUpperCase());
    movimientos = (mov || []).map(m => ({ ...m, monto: normalizarNumero(m.monto), cliente: (m.cliente_nombre || m.cliente || '').trim().toUpperCase() }));
    ventas = (ven || []).map(v => ({ ...v, total: normalizarNumero(v.total), cobroDeuda: normalizarNumero(v.cobroDeuda), fecha: fechaYMD(v.fecha) }));
    gastos = (gas || []).map(g => ({ ...g, monto: normalizarNumero(g.monto), fecha: fechaYMD(g.fecha) }));
    renderTodo();
    toast("Datos actualizados");
  } catch(e) { console.error(e); toast("Error de conexión"); }
}

function renderTodo() {
  renderResumen();
  renderDeudores();
  renderMovimientos();
}

function renderResumen() {
  let totalDeuda = 0, totalCobros = 0, totalGastosHoy = 0;
  for (const m of movimientos) {
    if (m.tipo === 'deuda') totalDeuda += m.monto;
    if (m.tipo === 'pago') totalCobros += m.monto;
  }
  const hoy = new Date().toISOString().slice(0,10);
  for (const g of gastos) if (g.fecha === hoy) totalGastosHoy += g.monto;
  let cobrosHoy = 0;
  for (const v of ventas) if (v.fecha === hoy && v.cobroDeuda > 0) cobrosHoy += v.cobroDeuda;
  for (const m of movimientos) if (m.fecha === hoy && m.tipo === 'pago') cobrosHoy += m.monto;
  const efectivoTransferHoy = ventas.filter(v => v.fecha === hoy && (v.pago === 'efectivo' || v.pago === 'transferencia')).reduce((a,b)=> a + b.total, 0);
  const neto = efectivoTransferHoy + cobrosHoy - totalGastosHoy;
  document.getElementById("totalDeudas").textContent = pesos(totalDeuda);
  document.getElementById("totalCobros").textContent = pesos(totalCobros);
  document.getElementById("totalGastos").textContent = pesos(totalGastosHoy);
  const netoEl = document.getElementById("netoTotal");
  netoEl.textContent = pesos(neto);
  netoEl.style.color = neto >=0 ? 'var(--success)' : 'var(--danger)';
}

function renderDeudores() {
  let saldos = {};
  clientes.forEach(c => saldos[c] = 0);
  for (const m of movimientos) {
    if (!saldos[m.cliente]) saldos[m.cliente] = 0;
    if (m.tipo === 'deuda') saldos[m.cliente] += m.monto;
    else if (m.tipo === 'pago') saldos[m.cliente] -= m.monto;
  }
  const deudores = Object.entries(saldos).filter(([,s]) => s > 0).sort((a,b)=>b[1]-a[1]);
  const tbody = document.getElementById("bodyDeudores");
  if (!tbody) return;
  if (deudores.length === 0) { tbody.innerHTML = '<tr><td colspan="3">Sin deudores</td></tr>'; return; }
  tbody.innerHTML = deudores.map(([c, s]) => `<tr><td>${c}</td><td class="num-negative">${pesos(s)}</td><td><span class="badge badge-deuda">DEBE</span></td></tr>`).join('');
}

function renderMovimientos(fechaFiltro = null) {
  let filtrados = movimientos.slice();
  if (fechaFiltro) filtrados = filtrados.filter(m => m.fecha === fechaFiltro);
  filtrados.sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
  const tbody = document.getElementById("bodyMovimientos");
  if (!tbody) return;
  if (filtrados.length === 0) { tbody.innerHTML = '<tr><td colspan="6">Sin movimientos</td></tr>'; return; }
  tbody.innerHTML = filtrados.map(m => `
    <tr>
      <td>${fechaDMY(m.fecha)}</td>
      <td><strong>${m.cliente}</strong></td>
      <td><span class="badge ${m.tipo==='deuda'?'badge-deuda':'badge-pago'}">${m.tipo==='deuda'?'DEUDA':'PAGO'}</span></td>
      <td class="num-positive">${pesos(m.monto)}</td>
      <td>${m.detalle || ''}</td>
      <td class="no-print"><button class="btn btn-danger btn-sm" onclick="eliminarMovimiento(${m.id})">🗑️</button></td>
    </tr>
  `).join('');
}

async function eliminarMovimiento(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  try {
    await apiCall('eliminarMovimiento', { id }, true);
    toast("Movimiento eliminado");
    await cargarTodo();
  } catch(e) { toast("Error"); }
}

function verHistorialCliente(cliente) {
  const filtrados = movimientos.filter(m => m.cliente === cliente).sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  let saldo = 0;
  for (const m of filtrados) { if (m.tipo === 'deuda') saldo += m.monto; else saldo -= m.monto; }
  const saldoHtml = `<div style="background:var(--surface2); padding:12px; border-radius:12px; margin-bottom:12px;">Saldo actual: <strong class="${saldo>0?'num-negative':'num-positive'}">${pesos(Math.abs(saldo))} ${saldo>0?'DEBE':'CRÉDITO'}</strong></div>`;
  if (filtrados.length === 0) { document.getElementById("clienteResultado").innerHTML = saldoHtml + '<p>Sin movimientos</p>'; return; }
  const tabla = `<div class="scroll-table"><table><thead><tr><th>Fecha</th><th>Tipo</th><th>Monto</th><th>Detalle</th></tr></thead><tbody>${filtrados.map(m => `<tr><td>${fechaDMY(m.fecha)}</td><td>${m.tipo==='deuda'?'DEUDA':'PAGO'}</td><td>${pesos(m.monto)}</td><td>${m.detalle||''}</td></tr>`).join('')}</tbody></table></div>`;
  document.getElementById("clienteResultado").innerHTML = saldoHtml + tabla;
}

function exportarExcelCompleto() {
  const wb = XLSX.utils.book_new();
  const resumen = [["Resumen", new Date().toLocaleString()], [], ["Total Deuda", document.getElementById("totalDeudas").innerText], ["Total Cobros", document.getElementById("totalCobros").innerText], ["Gastos Hoy", document.getElementById("totalGastos").innerText], ["Neto", document.getElementById("netoTotal").innerText]];
  const wsRes = XLSX.utils.aoa_to_sheet(resumen);
  XLSX.utils.book_append_sheet(wb, wsRes, "Resumen");
  const movs = movimientos.map(m => [fechaDMY(m.fecha), m.cliente, m.tipo, m.monto, m.detalle]);
  movs.unshift(["Fecha","Cliente","Tipo","Monto","Detalle"]);
  const wsMov = XLSX.utils.aoa_to_sheet(movs);
  XLSX.utils.book_append_sheet(wb, wsMov, "Movimientos");
  XLSX.writeFile(wb, `myc_resumen_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast("Excel exportado");
}
function exportarDeudoresExcel() {
  let saldos = {};
  clientes.forEach(c => saldos[c] = 0);
  for (const m of movimientos) { if (m.tipo === 'deuda') saldos[m.cliente] += m.monto; else saldos[m.cliente] -= m.monto; }
  const data = Object.entries(saldos).filter(([,s])=> s>0).map(([c,s]) => [c, s]);
  data.unshift(["Cliente", "Saldo Deudor"]);
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Deudores");
  XLSX.writeFile(wb, `deudores_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function exportarMovimientosExcel() {
  const fecha = document.getElementById("fechaMovimientos").value;
  let filtrados = movimientos.slice();
  if (fecha) filtrados = filtrados.filter(m => m.fecha === fecha);
  const data = filtrados.map(m => [fechaDMY(m.fecha), m.cliente, m.tipo, m.monto, m.detalle]);
  data.unshift(["Fecha","Cliente","Tipo","Monto","Detalle"]);
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Movimientos");
  XLSX.writeFile(wb, `movimientos_${fecha||"todos"}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

document.getElementById("refreshBtn").addEventListener("click", cargarTodo);
document.getElementById("exportExcelBtn").addEventListener("click", exportarExcelCompleto);
document.getElementById("verFechaMovBtn").addEventListener("click", () => { const f = document.getElementById("fechaMovimientos").value; if(f) renderMovimientos(f); else toast("Seleccione fecha"); });
document.getElementById("verTodosMovBtn").addEventListener("click", () => renderMovimientos());
document.getElementById("exportMovExcelBtn").addEventListener("click", exportarMovimientosExcel);
document.getElementById("buscarClienteBtn").addEventListener("click", () => { const nom = document.getElementById("buscarClienteInput").value.trim(); if(nom) verHistorialCliente(nom.toUpperCase()); else toast("Ingrese nombre"); });
document.getElementById("limpiarBusquedaBtn").addEventListener("click", () => { document.getElementById("buscarClienteInput").value = ""; document.getElementById("clienteResultado").innerHTML = ""; });
document.getElementById("modalCancelar").addEventListener("click", () => document.getElementById("modal").classList.remove("open"));
document.getElementById("modalConfirmar").addEventListener("click", () => document.getElementById("modal").classList.remove("open"));

cargarTodo();
setInterval(cargarTodo, 60000);
</script>
</body>
</html>

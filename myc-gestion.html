function hoy() { return new Date().toISOString().slice(0, 10); }
function formatearFecha(f) {
    if (!f) return '';
    if (f.includes('T')) f = f.split('T')[0];
    const d = new Date(f);
    if (isNaN(d.getTime())) return f;
    return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
}
function formatearFechaInput(f) {
    if (!f) return '';
    if (f.includes('T')) f = f.split('T')[0];
    return f;
}
function formatearFechaCompleta(f) {
    if (!f) return '';
    const d = new Date(f);
    if (isNaN(d.getTime())) return f;
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}
function pesos(n) { return '$' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 0 }); }
function normalizarNombre(n) { return (n || '').trim().toUpperCase().replace(/\s+/g, ' '); }
function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

function normalizarPago(pago) {
    if (!pago) return '';
    const p = String(pago).trim().toLowerCase();
    if (p.includes('efectivo')) return 'efectivo';
    if (p.includes('transferencia') || p.includes('transf') || p.includes('transfer')) return 'transferencia';
    if (p.includes('cobrocc') || p.includes('cobro cc') || p.includes('cobro de deuda') || p.includes('cobro')) return 'cobrocc';
    if (p.includes('ctacte') || p.includes('cuenta corriente') || p.includes('cta cte')) return 'ctacte';
    if (p.includes('deuda')) return 'deuda';
    return p;
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}
function copiarTabla(tablaId) {
    const tabla = document.getElementById(tablaId);
    if (!tabla) return;
    const texto = Array.from(tabla.querySelectorAll('tr'))
        .map(tr => Array.from(tr.children).filter(td => !td.classList.contains('no-print')).map(td => td.textContent.trim()).join('\t'))
        .join('\n');
    navigator.clipboard.writeText(texto).then(() => toast('✅ Tabla copiada'));
}
function copiarSeccion(id) {
    const el = document.getElementById(id);
    if (!el) { toast('❌ No se encontró la sección'); return; }
    const texto = el.textContent.trim();
    if (texto) {
        navigator.clipboard.writeText(texto).then(() => toast('✅ Copiado al portapapeles'));
    } else {
        toast('❌ No hay contenido para copiar');
    }
}
function exportarSeccionPDF(id, nombre) {
    const el = document.getElementById(id);
    if (!el) { toast('❌ No se encontró la sección'); return; }
    const elemento = el.cloneNode(true);
    elemento.querySelectorAll('.no-print, .btn, button').forEach(b => b.remove());
    const opt = {
        margin: 10,
        filename: `${nombre}_${hoy()}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    toast('📄 Generando PDF...');
    html2pdf().set(opt).from(elemento).save().then(() => toast('✅ PDF generado')).catch(() => toast('❌ Error al generar PDF'));
}
function toggleDebug() {
    const box = document.getElementById('debugBox');
    const btn = document.querySelector('.debug-toggle .btn');
    if (box.style.display === 'none' || box.style.display === '') {
        box.style.display = 'block';
        btn.innerHTML = '🐛 Ocultar Debug';
    } else {
        box.style.display = 'none';
        btn.innerHTML = '🐛 Mostrar Debug';
    }
}
function mostrarDebug(msg) {
    const box = document.getElementById('debugBox');
    box.style.display = 'block';
    box.innerHTML += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
    box.scrollTop = box.scrollHeight;
    const btn = document.querySelector('.debug-toggle .btn');
    if (btn) btn.innerHTML = '🐛 Ocultar Debug';
}

function inicializarCostos() {
    const costosDefault = { "1.7": 1000, "3.5": 1500, "14": 4000, "20": 4500, "32": 6000 };
    const costosGuardados = localStorage.getItem('myc_costos');
    if (!costosGuardados) {
        localStorage.setItem('myc_costos', JSON.stringify(costosDefault));
        localStorage.setItem('myc_costos_globales', JSON.stringify(costosDefault));
    } else {
        try {
            const parsed = JSON.parse(costosGuardados);
            let actualizado = false;
            for (const [key, val] of Object.entries(costosDefault)) {
                if (parsed[key] === undefined) { parsed[key] = val; actualizado = true; }
            }
            if (actualizado) {
                localStorage.setItem('myc_costos', JSON.stringify(parsed));
                localStorage.setItem('myc_costos_globales', JSON.stringify(parsed));
            }
        } catch(e) {
            localStorage.setItem('myc_costos', JSON.stringify(costosDefault));
            localStorage.setItem('myc_costos_globales', JSON.stringify(costosDefault));
        }
    }
    const stored = localStorage.getItem('myc_costos');
    if (stored) { try { costos = JSON.parse(stored); } catch(e) { costos = { ...costosDefault }; } } 
    else { costos = { ...costosDefault }; }
}

// ======================================================================
//  API CALLS
// ======================================================================
async function apiCall(ruta, params = {}, method = 'GET') {
    const url = new URL(API_URL);
    url.searchParams.append('ruta', ruta);
    const options = { method };
    if (method === 'POST') {
        const body = new URLSearchParams();
        body.append('ruta', ruta);
        for (const [key, value] of Object.entries(params)) { body.append(key, value); }
        options.body = body;
    } else {
        for (const [key, value] of Object.entries(params)) { url.searchParams.append(key, value); }
    }
    try {
        const res = await fetch(url.toString(), options);
        const data = await res.json();
        return data;
    } catch(e) {
        console.error('API Error:', e);
        toast('Error de conexión con la API');
        return { error: 'Error de conexión' };
    }
}

// ======================================================================
//  CARGA DE DATOS (MODIFICADA: ahora carga movimientos)
// ======================================================================
async function cargarDatos() {
    mostrarDebug('Iniciando carga de datos...');
    try {
        inicializarCostos();
        
        const clientesData = await apiCall('clientes');
        if (clientesData && Array.isArray(clientesData)) {
            clientes = clientesData.map(c => normalizarNombre(c)).filter(Boolean);
            mostrarDebug(`Clientes cargados: ${clientes.length}`);
        }

        // 1) Cargar ventas normales
        const ventasData = await apiCall('obtenerVentas');
        if (ventasData && Array.isArray(ventasData)) {
            ventas = ventasData.map(v => {
                const pagoNormalizado = normalizarPago(v.pago || 'efectivo');
                return {
                    id: v.id,
                    fecha: formatearFechaInput(v.fecha),
                    cliente: normalizarNombre(v.cliente),
                    cantidades: [
                        num(v.cantidades?.["1,7 KG"] || v.c17 || 0),
                        num(v.cantidades?.["3,5 KG"] || v.c35 || 0),
                        num(v.cantidades?.["14 KG"] || v.c14 || 0),
                        num(v.cantidades?.["ESC.20KG"] || v.c20 || 0),
                        num(v.cantidades?.["ESC.32KG"] || v.c32 || 0)
                    ],
                    total: num(v.total),
                    pago: pagoNormalizado,
                    detalle: v.detalle || '',
                    esMovimiento: false // marcador
                };
            });
            mostrarDebug(`Ventas cargadas: ${ventas.length}`);
        }

        // 2) Cargar movimientos de deuda (pagos y deudas) desde la misma API que usa Control de Deudas
        const movimientosData = await apiCall('movimientos');
        if (movimientosData && Array.isArray(movimientosData)) {
            movimientos = movimientosData.map(m => ({
                id: m.id,
                fecha: formatearFechaInput(m.fecha),
                cliente: normalizarNombre(m.cliente_nombre || m.cliente),
                tipo: m.tipo, // 'deuda' o 'pago'
                monto: num(m.monto),
                forma_pago: m.forma_pago,
                detalle: m.detalle || ''
            }));
            mostrarDebug(`Movimientos cargados: ${movimientos.length}`);

            // Convertir movimientos de tipo 'pago' en "ventas" de cobro para que la facturación los vea
            for (const m of movimientos) {
                if (m.tipo === 'pago') {
                    // Es un pago de deuda (cobrocc o transferencia)
                    let pagoNormalizado = 'cobrocc'; // por defecto
                    if (m.forma_pago && m.forma_pago.toLowerCase().includes('transferencia')) {
                        pagoNormalizado = 'transferencia';
                    }
                    // Agregar como una venta especial (sin productos)
                    ventas.push({
                        id: 'mov_' + m.id,
                        fecha: m.fecha,
                        cliente: m.cliente,
                        cantidades: [0,0,0,0,0],
                        total: m.monto,
                        pago: pagoNormalizado,
                        detalle: m.detalle || 'Pago de deuda',
                        esMovimiento: true
                    });
                }
                // Los movimientos de tipo 'deuda' ya están como ventas con pago 'ctacte' o 'deuda' en la API de ventas, no los duplicamos
            }
            mostrarDebug(`Ventas totales (incluyendo pagos como ventas): ${ventas.length}`);
        }

        const gastosData = await apiCall('obtenerGastos');
        if (gastosData && Array.isArray(gastosData)) {
            gastos = gastosData.map(g => ({
                id: g.id,
                fecha: formatearFechaInput(g.fecha),
                categoria: g.categoria || 'Otros',
                monto: num(g.monto),
                nota: g.nota || ''
            }));
            mostrarDebug(`Gastos cargados: ${gastos.length}`);
        }

        cargarFabricasLocal();

        const prodGuardados = localStorage.getItem('myc_productos');
        if (prodGuardados) { productos = JSON.parse(prodGuardados); } else {
            productos = [
                { clave: '1.7', nombre: '1,7 kg', costo: 1000, precio: 1500 },
                { clave: '3.5', nombre: '3,5 kg', costo: 1500, precio: 2500 },
                { clave: '14', nombre: '14 kg', costo: 4000, precio: 7000 },
                { clave: '20', nombre: '20 kg (escama)', costo: 4500, precio: 8000 },
                { clave: '32', nombre: '32 kg (escama)', costo: 6000, precio: 12000 }
            ];
            localStorage.setItem('myc_productos', JSON.stringify(productos));
        }

        for (const p of productos) {
            if (costos[p.clave] === undefined) { costos[p.clave] = p.costo || 1000; }
        }
        localStorage.setItem('myc_costos', JSON.stringify(costos));

        cargarHistorial();
        cargarGananciasCalendario();
        cargarGananciasDesdeVentas();

        actualizarUI();
        toast('✅ Datos sincronizados automáticamente');
        mostrarDebug('✅ Carga de datos completada');
    } catch(e) {
        console.error('Error al cargar datos:', e);
        toast('Error al sincronizar');
    }
}

function tieneProductos(v) {
    return (v.cantidades || []).some(q => (q || 0) > 0);
}

function cargarClientesFactura() {
    const select = document.getElementById('facturaCliente');
    if (!select) return;
    select.innerHTML = '<option value="">Seleccionar cliente...</option>';
    for (const c of clientes.sort()) { select.innerHTML += `<option value="${c}">${c}</option>`; }
    const hoyStr = hoy();
    const primerDiaMes = hoyStr.slice(0,7) + '-01';
    document.getElementById('facturaDesde').value = primerDiaMes;
    document.getElementById('facturaHasta').value = hoyStr;
}

function generarFactura() {
    const cliente = document.getElementById('facturaCliente').value;
    const desde = document.getElementById('facturaDesde').value;
    const hasta = document.getElementById('facturaHasta').value;

    if (!cliente) { toast('Seleccione un cliente'); return; }
    if (!desde || !hasta) { toast('Seleccione rango de fechas'); return; }
    if (desde > hasta) { toast('La fecha desde debe ser anterior a hasta'); return; }

    // Todas las ventas del cliente
    const todasVentasCliente = ventas.filter(v => v.cliente === cliente);

    // Deudas del período (ctacte y deuda)
    const deudas = todasVentasCliente.filter(v => 
        (v.pago === 'ctacte' || v.pago === 'deuda') && 
        v.fecha >= desde && v.fecha <= hasta
    );

    // Pagos de deuda: cobrocc y transferencias sin productos (en cualquier fecha)
    const pagos = todasVentasCliente.filter(v => {
        if (v.pago === 'cobrocc') return true;
        if (v.pago === 'transferencia' && !tieneProductos(v)) return true;
        return false;
    });

    const totalDeudas = deudas.reduce((acc, v) => acc + (v.total || 0), 0);
    const totalPagos = pagos.reduce((acc, v) => acc + (v.total || 0), 0);
    const deudaNeta = Math.max(0, totalDeudas - totalPagos);

    if (totalDeudas <= 0) {
        toast('❌ El cliente no tiene deudas registradas en este período');
        document.getElementById('facturaBox').style.display = 'none';
        document.getElementById('facturaVacia').style.display = 'block';
        return;
    }

    document.getElementById('facturaBox').style.display = 'block';
    document.getElementById('facturaVacia').style.display = 'none';

    facturaNumero++;
    document.getElementById('facturaNumero').textContent = String(facturaNumero).padStart(3, '0');
    document.getElementById('facturaClienteNombre').textContent = cliente;
    document.getElementById('facturaPeriodo').textContent = `${formatearFecha(desde)} al ${formatearFecha(hasta)}`;
    document.getElementById('facturaFechaEmision').textContent = formatearFechaCompleta(hoy());
    document.getElementById('facturaDeudaTotalMonto').textContent = pesos(deudaNeta);
    document.getElementById('facturaDeudaTotal').style.display = 'block';

    // ---- DESGLOSE ----
    let desgloseHtml = '<div style="font-size:0.75rem;color:var(--texto-claro);margin-top:6px;border-top:1px dashed var(--borde);padding-top:6px;">';
    if (deudas.length > 0) {
        desgloseHtml += '<strong>📋 Deudas del período:</strong><br>';
        const deudasAgrupadas = {};
        for (const v of deudas.sort((a,b) => a.fecha.localeCompare(b.fecha))) {
            if (!deudasAgrupadas[v.fecha]) deudasAgrupadas[v.fecha] = { total: 0, items: [] };
            deudasAgrupadas[v.fecha].total += v.total || 0;
            const detalle = v.cantidades ? v.cantidades.map((q, i) => {
                const claves = ["1.7", "3.5", "14", "20", "32"];
                return q > 0 ? `${claves[i]}kg:${q}` : null;
            }).filter(Boolean).join(' · ') : 'sin detalle';
            deudasAgrupadas[v.fecha].items.push(detalle);
        }
        for (const [fecha, info] of Object.entries(deudasAgrupadas)) {
            const itemsStr = info.items.length > 0 ? info.items.join(' · ') : 'sin detalle';
            desgloseHtml += `📅 ${formatearFecha(fecha)}: ${pesos(info.total)} (${itemsStr})<br>`;
        }
        const totalMostrado = Object.values(deudasAgrupadas).reduce((acc, i) => acc + i.total, 0);
        desgloseHtml += `<strong>💰 Total deudas del período: ${pesos(totalMostrado)}</strong>`;
    } else {
        desgloseHtml += 'No hay deudas en el período.<br>';
    }

    if (pagos.length > 0) {
        desgloseHtml += '<br><strong>💳 Pagos aplicados (cobros y transferencias sin producto):</strong><br>';
        const pagosAgrupados = {};
        for (const v of pagos.sort((a,b) => a.fecha.localeCompare(b.fecha))) {
            if (!pagosAgrupados[v.fecha]) pagosAgrupados[v.fecha] = { total: 0, items: [] };
            pagosAgrupados[v.fecha].total += v.total || 0;
            const label = v.pago === 'cobrocc' ? 'Cobro de deuda' : 'Transferencia (pago)';
            pagosAgrupados[v.fecha].items.push(label);
        }
        for (const [fecha, info] of Object.entries(pagosAgrupados)) {
            const itemsStr = info.items.join(' · ');
            desgloseHtml += `📅 ${formatearFecha(fecha)}: -${pesos(info.total)} (${itemsStr})<br>`;
        }
        const totalPagosMostrado = Object.values(pagosAgrupados).reduce((acc, i) => acc + i.total, 0);
        desgloseHtml += `<strong>💰 Total pagos: -${pesos(totalPagosMostrado)}</strong>`;
        desgloseHtml += `<br><strong style="color:var(--rojo);">💰 Deuda neta a facturar: ${pesos(deudaNeta)}</strong>`;
    } else {
        desgloseHtml += `<br><strong style="color:var(--rojo);">💰 Deuda neta a facturar: ${pesos(deudaNeta)}</strong>`;
    }
    desgloseHtml += '</div>';
    document.getElementById('facturaDesgloseDeudas').innerHTML = desgloseHtml;

    document.getElementById('facturaResumenPeriodo').textContent = pesos(totalDeudas);
    document.getElementById('facturaResumenDeuda').textContent = pesos(deudaNeta);
    document.getElementById('facturaResumenSaldo').textContent = '$0';
    document.getElementById('facturaResumenSaldo').style.color = 'var(--verde)';

    // ---- TABLA ----
    let html = '';
    for (const v of deudas.sort((a,b) => a.fecha.localeCompare(b.fecha))) {
        const detalle = v.cantidades ? v.cantidades.map((q, i) => {
            const claves = ["1.7", "3.5", "14", "20", "32"];
            return q > 0 ? `${claves[i]}kg:${q}` : null;
        }).filter(Boolean).join(' · ') : 'sin detalle';
        const cantTotal = (v.cantidades || []).reduce((a, b) => a + (b || 0), 0);
        const precioUnitario = cantTotal > 0 ? Math.round(v.total / cantTotal) : 0;
        html += `<tr><td>${formatearFecha(v.fecha)}</td><td>${detalle}</td><td>${cantTotal}</td><td>${pesos(precioUnitario)}</td><td>${pesos(v.total)}</td></tr>`;
    }
    for (const v of pagos.sort((a,b) => a.fecha.localeCompare(b.fecha))) {
        const label = v.pago === 'cobrocc' ? '🔄 Cobro de deuda' : '💳 Transferencia (pago)';
        html += `<tr style="color:var(--verde);"><td>${formatearFecha(v.fecha)}</td><td>${label}</td><td>—</td><td>—</td><td style="color:var(--verde);">-${pesos(v.total)}</td></tr>`;
    }
    if (deudas.length === 0 && pagos.length === 0) { html += `<tr><td colspan="5" style="text-align:center;color:var(--texto-claro);">Sin movimientos en el período</td></tr>`; }
    document.getElementById('facturaDetalleBody').innerHTML = html;
    document.getElementById('facturaTotal').textContent = pesos(deudaNeta);
    toast(`✅ Factura generada: ${cliente} debe ${pesos(deudaNeta)} en el período`);
}
